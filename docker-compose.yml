services:
  db:
    image: postgres:16
    container_name: preinvoice_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mahdi1378
      POSTGRES_DB: preinvoice
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d preinvoice"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:latest
    container_name: preinvoice_postgrest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:mahdi1378@db:5432/preinvoice
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_SERVER_PORT: 3000
    ports:
      - "3000:3000"

  ui:
    build:
      context: ./ui
    container_name: preinvoice_ui
    restart: unless-stopped
    depends_on:
      - postgrest
    ports:
      - "18080:80"

  swagger:
    image: swaggerapi/swagger-ui:latest
    container_name: preinvoice_swagger
    restart: unless-stopped
    depends_on:
      - postgrest
    environment:
      SWAGGER_JSON_URL: http://localhost:3000/
    ports:
      - "18082:8080"


volumes:
  pgdata:
