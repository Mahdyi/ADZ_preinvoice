<main class="invoice-shell">
  <section class="invoice-paper">
    <app-preinvoice-header
      [(preinvoiceNumber)]="preinvoiceNumber"
      [(issueDate)]="issueDate"
      [sellerText]="sellerText"
      [socialText]="socialText"
    ></app-preinvoice-header>

    <app-buyer-info-form
      [customerQuery]="customerQuery"
      [selectedCustomer]="selectedCustomer"
      [customerOptions]="customerOptions"
      (customerQueryChange)="customerQuery = $event; handleCustomerInput()"
      (searchRequested)="searchCustomers()"
      (customerSelected)="selectCustomer($event)"
      (createRequested)="prepareNewCustomer()"
    ></app-buyer-info-form>

    <app-create-customer-modal
      *ngIf="showCreateCustomer"
      [customer]="newCustomer"
      (closeRequested)="closeCreateCustomer()"
      (saveRequested)="createCustomer()"
    ></app-create-customer-modal>

    <app-create-equipment-modal
      *ngIf="showCreateEquipment"
      [equipment]="newEquipment"
      [rowNumber]="newEquipmentRowNumber"
      [quantity]="newEquipmentQuantity"
      [note]="newEquipmentNote"
      [calPosition]="newEquipmentCalPosition"
      [lineTotal]="formatMoney(newEquipmentLineTotal)"
      (quantityChange)="newEquipmentQuantity = $event"
      (noteChange)="newEquipmentNote = $event"
      (calPositionChange)="newEquipmentCalPosition = $event"
      (closeRequested)="closeCreateEquipment()"
      (saveRequested)="createEquipment()"
    ></app-create-equipment-modal>

    <app-preinvoice-items-table
      [rows]="rows"
      [rowTotal]="rowTotalForTable"
      (equipmentSearch)="searchEquipment($event)"
      (equipmentSelected)="selectEquipment($event.row, $event.item)"
      (createEquipment)="prepareNewEquipment($event)"
      (addRowRequested)="addRow()"
      (removeRowRequested)="removeRow($event)"
    ></app-preinvoice-items-table>

    <section class="totals-section editor-totals-section">
      <div class="editor-summary-row">
        <div class="action-row">
          <p-button
            type="button"
            icon="pi pi-save"
            [disabled]="loadingPreinvoice || (saving && !message)"
            [label]="
              loadingPreinvoice
                ? 'در حال دریافت...'
                : saving && !message
                  ? 'در حال ذخیره...'
                  : isEditMode
                    ? 'به‌روزرسانی پیش فاکتور'
                    : 'ذخیره پیش فاکتور'
            "
            (onClick)="savePreinvoice()"
          ></p-button>
        </div>

        <app-preinvoice-totals
          [subtotal]="currentSubtotal"
          [grandTotal]="currentSubtotal"
          [showVat]="false"
        ></app-preinvoice-totals>
      </div>

      <tse-preinvoice-print-items-table
        [rows]="printableRows"
      ></tse-preinvoice-print-items-table>
    </section>

    <section class="status" *ngIf="message || error">
      <p-message *ngIf="message" severity="success" [text]="message"></p-message>
      <p-message *ngIf="error" severity="error" [text]="error"></p-message>
    </section>

    <app-preinvoice-footer></app-preinvoice-footer>
  </section>
</main>
