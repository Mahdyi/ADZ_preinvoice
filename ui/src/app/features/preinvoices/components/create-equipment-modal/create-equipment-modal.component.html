<div class="modal-backdrop" (click)="closeRequested.emit()">
  <section class="customer-modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>ثبت تجهیز جدید</h2>
      <button
        type="button"
        class="icon-button neutral"
        title="بستن"
        aria-label="بستن"
        (click)="closeRequested.emit()"
      >
        ×
      </button>
    </div>

    <div class="create-grid equipment-create-grid">
      <label>
        ردیف
        <input name="newEquipmentRowNumber" [ngModel]="rowNumber" readonly />
      </label>
      <label>
        نام تجهیزات
        <input name="newEquipmentName" [(ngModel)]="equipment.equipment_name" />
      </label>
      <label>
        تعداد
        <input
          class="number-input"
          name="newEquipmentQuantity"
          type="number"
          min="0"
          step="1"
          [ngModel]="quantity"
          (ngModelChange)="quantityChange.emit($event)"
        />
      </label>
      <label>
        توضیح
        <input
          name="newEquipmentNote"
          [ngModel]="note"
          (ngModelChange)="noteChange.emit($event)"
        />
      </label>
      <label>
        Cal.position
        <input
          name="newEquipmentCal"
          [ngModel]="calPosition"
          (ngModelChange)="calPositionChange.emit($event)"
        />
      </label>
      <label>
        بهای واحد
        <input
          class="number-input"
          name="newEquipmentPrice"
          type="number"
          min="0"
          step="1000"
          [(ngModel)]="equipment.price"
        />
      </label>
      <label>
        مبلغ کل
        <input
          class="number-input"
          name="newEquipmentLineTotal"
          [ngModel]="lineTotal"
          readonly
        />
      </label>
    </div>

    <div class="modal-actions">
      <button type="button" class="soft-button" (click)="closeRequested.emit()">
        انصراف
      </button>
      <button
        type="button"
        class="primary-button"
        (click)="saveRequested.emit()"
      >
        ذخیره و انتخاب تجهیز
      </button>
    </div>
  </section>
</div>
