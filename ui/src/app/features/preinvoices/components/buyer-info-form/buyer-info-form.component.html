<section class="buyer-section">
  <div class="section-heading">
    <h2>مشخصات خریدار</h2>
    <p-button
      type="button"
      label="مشتری جدید"
      icon="pi pi-plus-circle"
      severity="secondary"
      [outlined]="true"
      (onClick)="createRequested.emit()"
    ></p-button>
  </div>

  <div class="buyer-grid">
    <label class="customer-picker">
      عنوان / شرکت
      <p-autocomplete
        inputId="customerQuery"
        name="customerQuery"
        optionLabel="title"
        [suggestions]="customerOptions"
        [ngModel]="customerAutocompleteValue"
        [forceSelection]="false"
        [completeOnFocus]="true"
        placeholder="نام مشتری را جستجو کنید"
        emptyMessage="موردی یافت نشد"
        (ngModelChange)="updateCustomerQuery($event)"
        (completeMethod)="completeCustomer($event)"
        (onFocus)="searchRequested.emit()"
        (onKeyUp)="handleCustomerKeyUp($event)"
        (onBlur)="selectMatchingCustomerQuery()"
        (onSelect)="selectCustomer($event)"
      >
        <ng-template let-customer pTemplate="item">
          <div class="option-item">
            <strong>{{ customer.title }}</strong>
            <small>
              {{ customer.code || 'بدون کد' }} ·
              {{ customer.phone || 'بدون تلفن' }}
            </small>
          </div>
        </ng-template>
      </p-autocomplete>
      <span class="print-value">{{
        selectedCustomer?.title || customerQuery || '-'
      }}</span>
    </label>

    <label>
      کد
      <input
        pInputText
        name="customerCode"
        [ngModel]="selectedCustomer?.code || ''"
        readonly
      />
      <span class="print-value">{{ selectedCustomer?.code || '-' }}</span>
    </label>

    <label>
      شماره تماس
      <input
        pInputText
        name="customerPhone"
        [ngModel]="selectedCustomer?.phone || ''"
        readonly
      />
      <span class="print-value">{{ selectedCustomer?.phone || '-' }}</span>
    </label>

    <label>
      کد پستی
      <input
        pInputText
        name="customerPostal"
        [ngModel]="selectedCustomer?.postal_code || ''"
        readonly
      />
      <span class="print-value">{{
        selectedCustomer?.postal_code || '-'
      }}</span>
    </label>

    <label>
      شناسه ملی
      <input
        pInputText
        name="customerNational"
        [ngModel]="selectedCustomer?.national_id || ''"
        readonly
      />
      <span class="print-value">{{
        selectedCustomer?.national_id || '-'
      }}</span>
    </label>

    <label>
      کد اقتصادی
      <input
        pInputText
        name="customerEconomic"
        [ngModel]="selectedCustomer?.economic_code || ''"
        readonly
      />
      <span class="print-value">{{
        selectedCustomer?.economic_code || '-'
      }}</span>
    </label>

    <label class="full">
      آدرس
      <textarea
        pTextarea
        name="customerAddress"
        rows="2"
        [ngModel]="selectedCustomer?.address || ''"
        readonly
      ></textarea>
      <span class="print-value">{{ selectedCustomer?.address || '-' }}</span>
    </label>
  </div>
</section>
