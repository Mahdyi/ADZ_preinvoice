<app-document-brand-banner></app-document-brand-banner>

<header class="invoice-header">
  <div class="meta-grid">
    <label>
      شماره
      @if (editable) {
        <input
          pInputText
          name="preinvoiceNumber"
          [ngModel]="preinvoiceNumber"
          (ngModelChange)="preinvoiceNumberChange.emit($event)"
        />
      }
      <span class="print-value">{{ preinvoiceNumber || '-' }}</span>
    </label>

    <label>
      تاریخ صدور
      @if (editable) {
        <input
          pInputText
          name="issueDate"
          type="date"
          [ngModel]="issueDate"
          (ngModelChange)="issueDateChange.emit($event)"
        />
      }
      <span class="print-value">{{ issueDate || '-' }}</span>
    </label>
  </div>

  <div class="title-block">
    <h1>پیش فاکتور</h1>
  </div>

  <div class="brand-mark">
    <img src="/naci.png" alt="NACI" />
  </div>
</header>

<section class="seller-strip">
  <p>{{ sellerText }}</p>
  <span>{{ socialText }}</span>
</section>
