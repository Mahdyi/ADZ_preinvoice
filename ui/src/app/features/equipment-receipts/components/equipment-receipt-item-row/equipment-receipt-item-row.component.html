<span class="row-index">{{ index + 1 }}</span>

<label class="equipment-picker">
  <p-autocomplete
    inputId="receiptEquipment{{ index }}"
    name="receiptEquipment{{ index }}"
    optionLabel="equipmentName"
    [suggestions]="row.equipmentOptions"
    [ngModel]="equipmentAutocompleteValue"
    [forceSelection]="false"
    [completeOnFocus]="true"
    placeholder="نام تجهیز"
    emptyMessage="موردی یافت نشد"
    (ngModelChange)="handleEquipmentModelChange($event)"
    (completeMethod)="completeEquipment($event)"
    (onFocus)="equipmentSearch.emit(row)"
    (onKeyUp)="handleEquipmentKeyUp($event)"
    (onBlur)="selectMatchingEquipmentQuery()"
    (onSelect)="selectEquipment($event)"
  >
    <ng-template let-option pTemplate="item">
      <div class="option-item">
        <strong>{{ option.equipmentName }}</strong>
        <small>
          {{ option.sheetName || '-' }} ·
          {{ option.measurementQuantity || '-' }} · {{ option.location || '-' }}
        </small>
      </div>
    </ng-template>
  </p-autocomplete>
  <span class="print-value">{{ row.equipmentName || '-' }}</span>
</label>

<input pInputText name="manufacturer{{ index }}" [(ngModel)]="row.manufacturer" />
<span class="print-value">{{ row.manufacturer || '-' }}</span>

<input pInputText name="modelClass{{ index }}" [(ngModel)]="row.modelClass" />
<span class="print-value">{{ row.modelClass || '-' }}</span>

<input
  pInputText
  name="requestedRange{{ index }}"
  [(ngModel)]="row.requestedRange"
/>
<span class="print-value">{{ row.requestedRange || '-' }}</span>

<input pInputText name="notes{{ index }}" [(ngModel)]="row.notes" />
<span class="print-value notes-print">{{ row.notes || '-' }}</span>

<div class="row-actions">
  <p-button
    type="button"
    styleClass="row-add"
    title="افزودن ردیف"
    aria-label="افزودن ردیف"
    icon="pi pi-plus"
    severity="secondary"
    [outlined]="true"
    (onClick)="addRequested.emit()"
  ></p-button>

  <p-button
    type="button"
    styleClass="row-remove"
    title="حذف ردیف"
    aria-label="حذف ردیف"
    icon="pi pi-times"
    severity="danger"
    [outlined]="true"
    (onClick)="removeRequested.emit(row)"
  ></p-button>
</div>
